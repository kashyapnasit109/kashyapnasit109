<svg width="440" height="400" viewBox="0 0 440 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="radarFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00cec9" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <rect width="440" height="400" fill="#0d0d14" rx="14"/>

  <text x="24" y="34" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" letter-spacing="2" fill="#6c5ce7">LEARNING RADAR</text>

  <!-- grid rings -->
  <polygon points="220.0,60.0 362.7,163.6 308.2,331.4 131.8,331.4 77.3,163.6" fill="none" stroke="#26263a" stroke-width="1"/>
  <polygon points="220.0,97.5 327.0,175.2 286.1,301.0 153.9,301.0 113.0,175.2" fill="none" stroke="#20202f" stroke-width="1"/>
  <polygon points="220.0,135.0 291.3,186.8 264.1,270.7 175.9,270.7 148.7,186.8" fill="none" stroke="#1c1c29" stroke-width="1"/>
  <polygon points="220.0,172.5 255.7,198.4 242.0,240.3 198.0,240.3 184.3,198.4" fill="none" stroke="#18182280" stroke-width="1"/>

  <!-- axis lines -->
  <line x1="220" y1="210" x2="220.0" y2="60.0" stroke="#26263a"/>
  <line x1="220" y1="210" x2="362.7" y2="163.6" stroke="#26263a"/>
  <line x1="220" y1="210" x2="308.2" y2="331.4" stroke="#26263a"/>
  <line x1="220" y1="210" x2="131.8" y2="331.4" stroke="#26263a"/>
  <line x1="220" y1="210" x2="77.3" y2="163.6" stroke="#26263a"/>

  <!-- data polygon -->
  <polygon points="220.0,75.0 327.0,175.2 277.3,288.9 145.1,313.1 134.4,182.2"
           fill="url(#radarFill)" stroke="#a29bfe" stroke-width="2" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="1s" fill="freeze"/>
  </polygon>

  <g fill="#a29bfe">
    <circle cx="220.0" cy="75.0" r="3.5"/>
    <circle cx="327.0" cy="175.2" r="3.5"/>
    <circle cx="277.3" cy="288.9" r="3.5"/>
    <circle cx="145.1" cy="313.1" r="3.5"/>
    <circle cx="134.4" cy="182.2" r="3.5"/>
  </g>

  <!-- labels -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#c9c6db" text-anchor="middle">
    <text x="220.0" y="20">AI / ML · 90%</text>
    <text x="428" y="150" text-anchor="end">Data Eng · 75%</text>
    <text x="345" y="392">Systems · 65%</text>
    <text x="95" y="392">Backend · 85%</text>
    <text x="12" y="150" text-anchor="start">Cloud · 60%</text>
  </g>
