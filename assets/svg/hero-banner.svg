<svg width="1000" height="360" viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121c"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e6e6f0"/>
      <stop offset="60%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1000" height="360" fill="url(#bgGrad)"/>
  <rect width="1000" height="360" fill="url(#dots)"/>
  <circle cx="820" cy="90" r="180" fill="url(#glow)"/>
  <circle cx="140" cy="300" r="140" fill="url(#glow)"/>

  <!-- top label -->
  <text x="60" y="70" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" letter-spacing="4" fill="#6c5ce7" opacity="0">
    ENGINEER · SYSTEM 01
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.8s" fill="freeze"/>
  </text>

  <!-- name -->
  <text x="58" y="165" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="64" fill="url(#textGrad)" opacity="0">
    Kashyap Nasit
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="1s" fill="freeze"/>
  </text>

  <!-- mission line -->
  <text x="60" y="205" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#9d99b3" opacity="0">
    Engineering clarity from complexity.
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="1s" fill="freeze"/>
  </text>

  <!-- thin divider -->
  <line x1="60" y1="235" x2="360" y2="235" stroke="#2a2a3a" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.6s" fill="freeze"/>
  </line>

  <!-- identity dashboard chips -->
  <g font-family="'JetBrains Mono', Consolas, monospace" font-size="12" fill="#c9c6db" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.8s" fill="freeze"/>
    <rect x="60" y="260" width="150" height="34" rx="17" fill="#16161f" stroke="#2a2a3a"/>
    <text x="80" y="282">CS Undergraduate</text>

    <rect x="222" y="260" width="128" height="34" rx="17" fill="#16161f" stroke="#2a2a3a"/>
    <text x="242" y="282">AI &amp; ML</text>

    <rect x="362" y="260" width="150" height="34" rx="17" fill="#16161f" stroke="#2a2a3a"/>
    <text x="382" y="282">Data Systems</text>

    <rect x="524" y="260" width="182" height="34" rx="17" fill="#16161f" stroke="#2a2a3a"/>
    <text x="544" y="282">Surat, Gujarat, IN</text>
  </g>

  <!-- cursor blink -->
  <rect x="480" y="145" width="4" height="46" fill="#6c5ce7" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1s" begin="1.4s" repeatCount="indefinite"/>
  </rect>
</svg>
